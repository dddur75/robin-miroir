# =====================================================================
# ROBIN MIROIR — LE SEUL FICHIER A CREER A LA MAIN.
# Tout le reste (scripts, dashboard, registre) s'installe automatiquement
# au premier passage, puis se met a jour tout seul par numero de version.
# Les donnees (Grand Livre) ne sont JAMAIS ecrasees.
# =====================================================================
name: Robin Miroir
on:
  schedule:
    - cron: "*/10 * * * *"     # Guetteur : capture des cotes
    - cron: "30 1 * * *"       # Arbitre : reglement + Auditeur : integrite
    - cron: "0 19 * * 0"       # Messager : rapport hebdo (dimanche)
  workflow_dispatch:
    inputs:
      tache:
        description: "Tache a lancer"
        type: choice
        default: auto
        options:
          - auto
          - capture
          - reglement
          - rapport
          - audit
          - labo
permissions:
  contents: write
  issues: write
  pages: write
concurrency:
  group: robin-ledger
  cancel-in-progress: false
jobs:
  robin:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Installation automatique
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - <<'ROBIN_PAYLOAD'
          MANIFESTE = {
              "scripts/config.py": ("managed", ""),
              "scripts/devig.py": ("managed", ""),
              "scripts/utils.py": ("managed", ""),
              "scripts/capture.py": ("managed", ""),
              "scripts/reglement.py": ("managed", ""),
              "scripts/rapport.py": ("managed", ""),
              "scripts/dashboard.py": ("managed", ""),
              "scripts/metriques.py": ("managed", ""),
              "scripts/audit.py": ("managed", ""),
              "scripts/chef.py": ("managed", ""),
              "scripts/alerte_echec.py": ("managed", ""),
              "scripts/labo_devig.py": ("managed", ""),
              "scripts/test_a_blanc.py": ("managed", ""),
              "README.md": ("managed", ""),
              "protocole.md": ("managed", ""),
              "GUIDE_INSTALLATION.md": ("managed", ""),
              "requirements.txt": ("managed", "cmVxdWVzdHM+PTIuMzEK"),
              "data/grand_livre.jsonl": ("seed", ""),
              "data/shadow.jsonl": ("seed", ""),
              "data/state.json": ("seed", "e30K"),
              "data/team_mapping.json": ("seed", "e30K"),
              "docs/index.html": ("seed", ""),
              "rapports/LISEZMOI.txt": ("seed", "TGVzIHJhcHBvcnRzIGhlYmRvIChkaW1hbmNoZSBzb2lyKSBzJ2FyY2hpdmVudCBpY2kgYXV0b21hdGlxdWVtZW50Lgo="),
              "labo/LISEZMOI.txt": ("seed", "TGUgcmFwcG9ydCBkdSBkdWVsIGRlcyBkw6l2aWdhZ2VzICh3b3JrZmxvdyBMYWJvKSBzJ8OpY3JpdCBpY2kuCg=="),
          }
          import base64, json, os, urllib.request

          CIBLE = "2.0"

          def api(url, corps=None, methode="GET"):
              tok, repo = os.environ.get("GH_TOKEN"), os.environ.get("GH_REPO")
              if not tok or not repo:
                  return None
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}{url}",
                  data=json.dumps(corps).encode() if corps is not None else None,
                  headers={"Authorization": f"Bearer {tok}",
                           "Accept": "application/vnd.github+json"},
                  method=methode)
              return urllib.request.urlopen(req, timeout=20)

          def issue(titre, corps):
              try:
                  r = api("/issues?state=open&per_page=100")
                  if r is None:
                      return
                  if any(i.get("title") == titre for i in json.load(r)):
                      return
                  api("/issues", {"title": titre, "body": corps}, "POST")
              except Exception as e:
                  print(f"[INSTALLATEUR] issue impossible : {e}")

          def ecrire(chemin, b64):
              d = os.path.dirname(chemin)
              if d:
                  os.makedirs(d, exist_ok=True)
              with open(chemin, "wb") as f:
                  f.write(base64.b64decode(b64))

          try:
              version = json.load(open("data/version.json"))
          except Exception:
              version = {}
          premiere_fois = not version.get("version")

          if version.get("version") == CIBLE:
              manquants = 0
              for chemin, (mode, b64) in MANIFESTE.items():
                  if not os.path.exists(chemin):
                      ecrire(chemin, b64)
                      manquants += 1
              print(f"[INSTALLATEUR] deja en V{CIBLE}"
                    + (f" — {manquants} fichier(s) manquant(s) restaure(s)." if manquants else " — rien a faire."))
          else:
              n = 0
              for chemin, (mode, b64) in MANIFESTE.items():
                  if mode == "seed" and os.path.exists(chemin):
                      continue
                  ecrire(chemin, b64)
                  n += 1
              import datetime
              quand = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
              os.makedirs("data", exist_ok=True)
              json.dump({"version": CIBLE,
                         "installe_le": version.get("installe_le") or quand,
                         "maj_le": quand},
                        open("data/version.json", "w"))
              print(f"[INSTALLATEUR] V{CIBLE} en place — {n} fichier(s) ecrits. "
                    "Les donnees existantes n'ont pas ete touchees.")

              # GitHub Pages — activation automatique (best effort)
              try:
                  api("/pages", {"source": {"branch": "main", "path": "/docs"}}, "POST")
                  print("[INSTALLATEUR] GitHub Pages active automatiquement (main /docs).")
              except Exception as e:
                  code = getattr(e, "code", None)
                  if code == 409:
                      print("[INSTALLATEUR] GitHub Pages deja actif.")
                  else:
                      print(f"[INSTALLATEUR] Pages non active automatiquement ({code}).")
                      if premiere_fois:
                          issue("📊 Active le dashboard (3 clics)",
                                "L'activation automatique de GitHub Pages n'a pas pu se faire.\n\n"
                                "1. **Settings** -> **Pages**\n"
                                "2. Source : **Deploy from a branch** -> Branch **main** -> dossier **/docs**\n"
                                "3. **Save**\n\nC'est tout. Le dashboard s'affichera ~2 min apres.")

              if premiere_fois:
                  repo = os.environ.get("GH_REPO", "")
                  url = (f"https://{repo.split('/')[0]}.github.io/{repo.split('/')[1]}/"
                         if "/" in repo else "(active Pages pour l'obtenir)")
                  issue("✅ Robin Miroir est installe et tourne tout seul",
                        f"La machine V{CIBLE} est en place.\n\n"
                        f"- 📊 **Dashboard** : {url} (compte ~2 minutes apres ce premier passage)\n"
                        "- 🔑 S'il manque une cle, une issue dediee s'ouvrira avec la marche a suivre exacte\n"
                        "- 📅 Rapport hebdo : dimanche soir (Telegram si configure, sinon dossier `rapports/`)\n"
                        "- 🧪 Rodage jusqu'au 19 juillet, registre officiel le 20 juillet\n\n"
                        "Aucune action attendue si le dashboard s'affiche. Tu peux fermer cette issue.")
          ROBIN_PAYLOAD
      - name: Execution de la tache
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SCHEDULE: ${{ github.event.schedule }}
          TACHE: ${{ inputs.tache }}
        run: python scripts/chef.py
      - name: Commit
        run: |
          git config user.name "robin-miroir[bot]"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Rien a committer" && exit 0
          git commit -m "robin $(date -u +'%Y-%m-%d %H:%M')"
          for i in 1 2 3; do git pull --rebase && git push && break || sleep 5; done
      - name: Alerte si echec
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -f scripts/alerte_echec.py ]; then
            python scripts/alerte_echec.py "Robin Miroir"
          else
            echo "Echec avant l'installation des scripts."
          fi
